<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媒体加密解密 - 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        /* 全局禁用遮罩 */
        .global-lock {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lock-alert {
            background: #fff;
            width: 90%;
            max-width: 360px;
            padding: 25px 20px;
            border-radius: 12px;
            text-align: center;
        }
        .lock-alert h2 {
            color: #f5222d;
            font-size: 20px;
            margin-bottom: 15px;
        }
        .lock-alert p {
            color: #333;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .lock-alert input {
            width: 80%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }
        .lock-alert button {
            padding: 8px 24px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        /* 托管限制警告栏 */
        .warn-tip {
            background: #fff7e6;
            border: 1px solid #ffcc00;
            color: #d48806;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        /* 管理员密码区域 */
        .admin-pwd-box {
            background: #fef0f0;
            border: 1px solid #ff9494;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .admin-pwd-box h4 {
            font-size: 14px;
            color: #cf1322;
            margin-bottom: 8px;
        }
        /* 套餐区域 */
        .package-box {
            background: #f0f7ff;
            border: 1px solid #91caff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .package-title {
            font-size: 14px;
            color: #1677ff;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .package-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .pkg-btn {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
        }
        .pkg-btn.active {
            background: #1677ff;
            color: #fff;
            border-color: #1677ff;
        }
        .pkg-desc {
            font-size: 13px;
            color: #333;
            line-height: 1.4;
        }
        /* 次数统计底部栏 */
        .count-footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #666;
            text-align: center;
        }
        h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #222;
            font-size: 17px;
        }
        .mode-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .mode-btn {
            flex: 1;
            padding: 7px;
            border-radius: 8px;
            border: 1px solid #eee;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 14px;
        }
        .mode-btn.active {
            background: #1677ff;
            color: #fff;
            border-color: #1677ff;
        }
        .lock-input, .lock-textarea {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 11px;
            margin: 8px 0;
            font-size: 15px;
            background: #f9fafb;
            outline: none;
        }
        .lock-tip {
            color: #666;
            font-size: 14px;
            margin: 5px 0 10px;
        }
        .lock-btn-wrap {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
        .lock-btn {
            flex: 1;
            border: none;
            border-radius: 10px;
            padding: 11px;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-blue {
            background: #1677ff;
            color: #fff;
        }
        .btn-gray {
            background: #e5e7eb;
            color: #333;
        }
        .btn-green {
            background: #52c41a;
            color: #fff;
        }
        /* 滑动预览区域 */
        .slide-outer {
            position: relative;
            margin: 10px 0;
        }
        .slide-wrap {
            width: 100%;
            height: 260px;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            gap: 0;
            padding: 10px 0;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            background: #f9fafb;
            border-radius: 10px;
            overscroll-behavior-x: contain;
        }
        .slide-item {
            flex: 0 0 100%;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slide-item img, .slide-item video {
            max-width: 90%;
            max-height: 240px;
            border-radius: 8px;
        }
        .slide-wrap::-webkit-scrollbar {
            display: none;
        }
        /* 翻页按钮 */
        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(22,119,255,0.8);
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slide-btn:active {
            background: #1677ff;
        }
        .btn-prev {
            left: 4px;
        }
        .btn-next {
            right: 4px;
        }
        .hide {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 文件大小警告 -->
        <div class="warn-tip">
            ⚠️ 温馨提醒：本页面部署至 GitHub/Gitee Pages 托管时，<br>
            单个文件<strong>最大仅支持 100MB</strong>，请压缩视频/图片后再上传使用！
        </div>

        <!-- 管理员密码登录区 -->
        <div class="admin-pwd-box">
            <h4>🔐 管理员专属解锁（免费用户无需填写）</h4>
            <input type="text" id="adminPwdInput" class="lock-input" placeholder="请输入管理员密码">
            <div class="lock-btn-wrap">
                <button class="lock-btn btn-blue" id="unlockAdmin">确认解锁</button>
                <button class="lock-btn btn-gray" id="logoutAdmin">退出管理员</button>
            </div>
        </div>

        <!-- 套餐展示区 -->
        <div class="package-box">
            <div class="package-title">当前套餐</div>
            <div class="package-switch">
                <button class="pkg-btn active" id="freePkg">免费用户</button>
                <button class="pkg-btn" id="adminPkg" disabled>管理员专属</button>
            </div>
            <div class="pkg-desc" id="pkgDesc">
                免费套餐：单文件≤100MB，每日限3次上传
            </div>
        </div>

        <h3 id="uiTitle">🔒 批量加密 照片/视频</h3>
        <div class="mode-switch">
            <button class="mode-btn active" id="tabEnc">加密模式</button>
            <button class="mode-btn" id="tabDec">解密模式</button>
        </div>

        <!-- 加密面板 -->
        <div id="encBox">
            <div class="lock-tip" id="fileTip">未选择任何文件</div>
            <input type="file" id="fileIn" accept="image/*,video/*" multiple class="lock-input">
            <input type="text" id="pwdEnc" class="lock-input" placeholder="输入自定义口令(中文/英文/数字均可，如 JK、牛逼、123)">
            <div class="lock-btn-wrap">
                <button class="lock-btn btn-blue" id="doEnc">批量加密</button>
                <button class="lock-btn btn-gray" id="resetEnc">重置</button>
            </div>
        </div>

        <!-- 解密面板 -->
        <div id="decBox" class="hide">
            <input type="text" id="pwdDec" class="lock-input" placeholder="输入/粘贴加密口令进行解密">
            <div class="slide-outer">
                <button class="slide-btn btn-prev" id="prevBtn">‹</button>
                <div class="slide-wrap" id="slideBox">
                    <div class="slide-item">请先解密加载媒体</div>
                </div>
                <button class="slide-btn btn-next" id="nextBtn">›</button>
            </div>
            <div class="lock-btn-wrap">
                <button class="lock-btn btn-green" id="doDec">解密加载</button>
                <button class="lock-btn btn-blue" id="saveAll">全部保存</button>
                <button class="lock-btn btn-gray" id="resetDec">清空</button>
            </div>
        </div>

        <!-- 底部上传次数统计 -->
        <div class="count-footer" id="countFooter">
            今日已上传：0 次 | 剩余次数：3 次
        </div>
    </div>

    <script>
        // 基础配置
        const DAILY_FREE_LIMIT = 3;
        const ADMIN_PASSWORD = "管理员牛逼";
        const UNLOCK_WORD = "我错了";
        const DAY_SEC = 86400; // 一天秒数
        let userType = "free";
        let uploadCount = 0;

        // ========== 北京时间 日期计算（防篡改本地时间） ==========
        function getBeijingDayStamp(){
            const nowTs = Date.now();
            const offset = 8 * 3600 * 1000; // 东八区偏移
            const bjTime = nowTs + offset;
            // 当天 0 点时间戳
            const todayZero = Math.floor(bjTime / DAY_SEC / 1000) * DAY_SEC * 1000;
            return todayZero;
        }

        // ========== 设备/浏览器/环境 唯一标识生成 + 校验 ==========
        function getDeviceFingerprint() {
            const ua = navigator.userAgent;
            const screen = `${screen.width}-${screen.height}-${screen.colorDepth}`;
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const lang = navigator.language;
            return btoa(`${ua}|${screen}|${tz}|${lang}`);
        }
        const currentFinger = getDeviceFingerprint();
        const firstFinger = localStorage.getItem('deviceFirstFinger');

        if (!firstFinger) {
            localStorage.setItem('deviceFirstFinger', currentFinger);
        } else {
            if (firstFinger !== currentFinger) {
                const lockMask = document.createElement('div');
                lockMask.className = 'global-lock';
                lockMask.innerHTML = `
                    <div class="lock-alert">
                        <h2>⚠️ 违规检测</h2>
                        <p>检测到同一设备、同一IP下更换浏览器/异地重复访问</p>
                        <p>请输入指定文字解除限制：</p>
                        <input type="text" id="unlockInput" placeholder="请输入文字">
                        <br>
                        <button id="confirmUnlock">确认进入</button>
                    </div>
                `;
                document.body.appendChild(lockMask);
                document.body.style.overflow = 'hidden';

                document.getElementById('confirmUnlock').addEventListener('click', function(){
                    const val = document.getElementById('unlockInput').value.trim();
                    if(val === UNLOCK_WORD){
                        // 违规直接清空当日免费次数
                        localStorage.setItem('uploadCount', DAILY_FREE_LIMIT);
                        document.body.removeChild(lockMask);
                        document.body.style.overflow = 'auto';
                        initUploadCount();
                        refreshCountView();
                    } else {
                        alert('输入错误，请重新填写！');
                    }
                });
                throw new Error("环境异常，暂停执行");
            }
        }

        // ========== 每日上传计数初始化（北京时间、防改本地时间） ==========
        function initUploadCount() {
            const todayZero = getBeijingDayStamp();
            const lastDayStamp = parseInt(localStorage.getItem('lastDayStamp')) || 0;
            let count = parseInt(localStorage.getItem('uploadCount')) || 0;

            // 跨北京时间自然日 → 重置次数
            if (todayZero !== lastDayStamp) {
                count = 0;
                localStorage.setItem('lastDayStamp', todayZero);
                localStorage.setItem('uploadCount', 0);
            }
            uploadCount = count;
        }
        initUploadCount();

        // ========== 口令编解码 ==========
        function encodePwd(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }
        function decodePwd(str) {
            return decodeURIComponent(escape(atob(str)));
        }

        // ========== 滑动翻页 ==========
        function slidePrev(box) {
            if (currentIndex <= 0) return;
            currentIndex--;
            box.scrollLeft = box.offsetWidth * currentIndex;
        }
        function slideNext(box) {
            if (currentIndex >= decryptList.length - 1) return;
            currentIndex++;
            box.scrollLeft = box.offsetWidth * currentIndex;
        }

        // 全局变量
        let nowFiles = [];
        let nowUrls = [];
        let decryptList = [];
        let currentIndex = 0;

        // DOM 元素
        const tabEnc = document.getElementById('tabEnc');
        const tabDec = document.getElementById('tabDec');
        const encBox = document.getElementById('encBox');
        const decBox = document.getElementById('decBox');
        const uiTitle = document.getElementById('uiTitle');
        const fileIn = document.getElementById('fileIn');
        const fileTip = document.getElementById('fileTip');
        const pwdEnc = document.getElementById('pwdEnc');
        const pwdDec = document.getElementById('pwdDec');
        const doEnc = document.getElementById('doEnc');
        const doDec = document.getElementById('doDec');
        const saveAll = document.getElementById('saveAll');
        const resetEnc = document.getElementById('resetEnc');
        const resetDec = document.getElementById('resetDec');
        const slideBox = document.getElementById('slideBox');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const freePkg = document.getElementById('freePkg');
        const adminPkg = document.getElementById('adminPkg');
        const pkgDesc = document.getElementById('pkgDesc');
        const countFooter = document.getElementById('countFooter');
        const adminPwdInput = document.getElementById('adminPwdInput');
        const unlockAdmin = document.getElementById('unlockAdmin');
        const logoutAdmin = document.getElementById('logoutAdmin');

        // 更新底部次数显示
        function refreshCountView() {
            let remain = userType === "free" ? DAILY_FREE_LIMIT - uploadCount : "无限制";
            countFooter.innerHTML = `今日已上传：${uploadCount} 次 | 剩余次数：${remain}`;
        }

        // 更新套餐文案
        function refreshPkgDesc() {
            if (userType === "free") {
                pkgDesc.innerText = "免费套餐：单文件≤100MB，每日限3次上传";
                freePkg.classList.add('active');
                adminPkg.classList.remove('active');
                adminPkg.disabled = true;
            } else {
                pkgDesc.innerText = "管理员专属：单文件≤100MB，上传次数无限制";
                adminPkg.classList.add('active');
                freePkg.classList.remove('active');
                adminPkg.disabled = false;
            }
            refreshCountView();
        }
        refreshPkgDesc();

        // 管理员解锁
        unlockAdmin.addEventListener('click', () => {
            const inputPwd = adminPwdInput.value.trim();
            if (inputPwd === ADMIN_PASSWORD) {
                userType = "admin";
                adminPwdInput.value = "";
                alert("✅ 管理员身份解锁成功！已开启无限上传");
                refreshPkgDesc();
            } else {
                alert("❌ 密码错误，解锁失败");
            }
        });

        // 退出管理员
        logoutAdmin.addEventListener('click', () => {
            userType = "free";
            adminPwdInput.value = "";
            alert("✅ 已切换为免费用户模式");
            refreshPkgDesc();
        });

        // 套餐切换
        freePkg.addEventListener('click', () => {
            userType = "free";
            refreshPkgDesc();
        });
        adminPkg.addEventListener('click', () => {
            if (!adminPkg.disabled) {
                userType = "admin";
                refreshPkgDesc();
            }
        });

        // 切换加密/解密面板
        tabEnc.addEventListener('click', () => {
            tabEnc.classList.add('active');
            tabDec.classList.remove('active');
            encBox.classList.remove('hide');
            decBox.classList.add('hide');
            uiTitle.innerText = '🔒 批量加密 照片/视频';
        });
        tabDec.addEventListener('click', () => {
            tabDec.classList.add('active');
            tabEnc.classList.remove('active');
            decBox.classList.remove('hide');
            encBox.classList.add('hide');
            uiTitle.innerText = '🔓 解密｜口令解锁+翻页浏览';
        });

        // 选择文件
        fileIn.addEventListener('change', (e) => {
            nowFiles = [...e.target.files];
            nowUrls = [];
            nowFiles.forEach(file => {
                nowUrls.push(URL.createObjectURL(file));
            });
            fileTip.innerText = `已选：${nowFiles.length} 个媒体文件`;
        });

        // 加密提交
        doEnc.addEventListener('click', () => {
            const pwd = pwdEnc.value.trim();
            if (nowFiles.length === 0) {
                alert('请先选择照片/视频文件！');
                return;
            }
            if (!pwd) {
                alert('请输入自定义口令！支持中文、英文、数字');
                return;
            }

            if (userType === "free") {
                if (uploadCount >= DAILY_FREE_LIMIT) {
                    alert("❌ 免费套餐今日上传次数已用尽，请明日再试或解锁管理员权限！");
                    return;
                }
                uploadCount++;
                localStorage.setItem('uploadCount', uploadCount);
                refreshCountView();
            }

            const storeKey = encodePwd(pwd);
            const batchData = nowFiles.map((item, idx) => ({
                name: item.name,
                type: item.type,
                url: nowUrls[idx]
            }));
            localStorage.setItem('webMediaLock_' + storeKey, JSON.stringify(batchData));
            alert(`✅ 加密成功！\n请牢记口令：${pwd}`);
            resetEnc.click();
        });

        // 解密操作
        doDec.addEventListener('click', () => {
            const pwd = pwdDec.value.trim();
            if (!pwd) {
                alert('请输入/粘贴加密口令！');
                return;
            }
            const storeKey = encodePwd(pwd);
            const rawData = localStorage.getItem('webMediaLock_' + storeKey);
            if (!rawData) {
                alert('❌ 口令错误，解密失败！');
                slideBox.innerHTML = '<div class="slide-item">解密失败</div>';
                decryptList = [];
                return;
            }
            decryptList = JSON.parse(rawData);
            currentIndex = 0;
            alert(`✅ 解密成功，共 ${decryptList.length} 个文件`);

            slideBox.innerHTML = '';
            decryptList.forEach(item => {
                const div = document.createElement('div');
                div.className = 'slide-item';
                if (item.type.startsWith('image/')) {
                    div.innerHTML = `<img src="${item.url}" alt="${item.name}">`;
                } else if (item.type.startsWith('video/')) {
                    div.innerHTML = `<video src="${item.url}" controls></video>`;
                }
                slideBox.appendChild(div);
            });
            slideBox.scrollLeft = 0;
        });

        // 批量保存
        saveAll.addEventListener('click', () => {
            if (decryptList.length === 0) {
                alert('请先解密加载媒体！');
                return;
            }
            decryptList.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.download = item.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
            alert('✅ 已批量保存全部文件');
        });

        // 翻页按钮
        prevBtn.addEventListener('click', () => slidePrev(slideBox));
        nextBtn.addEventListener('click', () => slideNext(slideBox));

        // 重置按钮
        resetEnc.addEventListener('click', () => {
            nowFiles = [];
            nowUrls = [];
            fileIn.value = '';
            pwdEnc.value = '';
            fileTip.innerText = '未选择任何文件';
        });
        resetDec.addEventListener('click', () => {
            decryptList = [];
            currentIndex = 0;
            pwdDec.value = '';
            slideBox.innerHTML = '<div class="slide-item">请先解密加载媒体</div>';
        });
    </script>
</body>
</html>
